# Local / dev composition: API + PostgreSQL.
# The walking skeleton proves host + auth + persistence wire together (10-solution-structure.md).
services:
  postgres:
    image: postgres:17
    container_name: filer-postgres
    environment:
      POSTGRES_DB: filer
      POSTGRES_USER: filer
      POSTGRES_PASSWORD: filer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - filer-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filer -d filer"]
      interval: 5s
      timeout: 5s
      retries: 5

  filer.api:
    build:
      context: .
      dockerfile: src/Filer.Api/Dockerfile
    container_name: filer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=filer;Username=filer;Password=filer_dev_password"
      # Dev-only signing key. In real environments supply Jwt__SigningKey via a secret store, never source control (05-security.md).
      Jwt__Issuer: "filer-api"
      Jwt__Audience: "filer-clients"
      Jwt__SigningKey: "dev-only-signing-key-change-me-please-32-bytes-min"
      Jwt__AccessTokenMinutes: "15"
      # Blob root inside the container; backed by the named volume below (07-storage-and-deployment.md).
      Storage__RootPath: "/data/storage"
      # OTLP sink = the aspire-dashboard service (ADR-013). Set unconditionally:
      # when the observability profile is down, the exporter drops batches
      # silently in the background - the app is unaffected.
      Observability__Otlp__Endpoint: "http://aspire-dashboard:18889"
    ports:
      - "8080:8080"
    volumes:
      - filer-storage:/data/storage

  # Local, no-egress AI runtime for the Ollama analysis provider (#52, 06-ai-analysis-pipeline.md).
  # Behind the "ai" profile so a plain `docker compose up` never pulls the (large) image;
  # start it with `docker compose --profile ai up`. Pull a model once it is running, e.g.
  # `docker compose exec ollama ollama pull llama3.2:3b`, and set AiAnalysis__Provider=Ollama.
  ollama:
    image: ollama/ollama
    container_name: filer-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - filer-ollama:/root/.ollama

  # Local telemetry viewer (ADR-013): the standalone Aspire dashboard as OTLP
  # sink - NOT the Aspire AppHost/orchestration model. Behind the
  # "observability" profile so a plain `docker compose up` never starts it:
  # `docker compose --profile observability up`. UI on http://localhost:18888.
  # Anonymous auth is for this local-only viewer; no real environment ships it (07).
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.5
    container_name: filer-aspire-dashboard
    profiles: ["observability"]
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888" # dashboard UI
      - "4317:18889"  # OTLP/gRPC ingest, exposed for an API running on the host (dotnet run)

  # Broker dispatch for background jobs (ADR-008), behind the "mq" profile so a
  # plain `docker compose up` keeps today's Db dispatch. Opt in with
  # `docker compose --profile mq up` and BackgroundJobs__Queue=RabbitMq on the
  # api service. Management UI on http://localhost:15672 (guest/guest, dev only).
  rabbitmq:
    image: rabbitmq:4-management
    container_name: filer-rabbitmq
    profiles: ["mq"]
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - filer-rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  filer-pgdata:
  filer-storage:
  filer-ollama:
  filer-rabbitmq:
