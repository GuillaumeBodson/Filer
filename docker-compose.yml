# Local / dev composition: API + PostgreSQL.
# The walking skeleton proves host + auth + persistence wire together (10-solution-structure.md).
services:
  postgres:
    image: postgres:17
    container_name: filer-postgres
    environment:
      POSTGRES_DB: filer
      POSTGRES_USER: filer
      POSTGRES_PASSWORD: filer_dev_password
    ports:
      - "5432:5432"
    volumes:
      - filer-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filer -d filer"]
      interval: 5s
      timeout: 5s
      retries: 5

  filer.api:
    build:
      context: .
      dockerfile: src/Filer.Api/Dockerfile
    container_name: filer-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=filer;Username=filer;Password=filer_dev_password"
      # Dev-only signing key. In real environments supply Jwt__SigningKey via a secret store, never source control (05-security.md).
      Jwt__Issuer: "filer-api"
      Jwt__Audience: "filer-clients"
      Jwt__SigningKey: "dev-only-signing-key-change-me-please-32-bytes-min"
      Jwt__AccessTokenMinutes: "15"
      # Blob root inside the container; backed by the named volume below (07-storage-and-deployment.md).
      Storage__RootPath: "/data/storage"
    ports:
      - "8080:8080"
    volumes:
      - filer-storage:/data/storage

  # Local, no-egress AI runtime for the Ollama analysis provider (#52, 06-ai-analysis-pipeline.md).
  # Behind the "ai" profile so a plain `docker compose up` never pulls the (large) image;
  # start it with `docker compose --profile ai up`. Pull a model once it is running, e.g.
  # `docker compose exec ollama ollama pull llama3.2:3b`, and set AiAnalysis__Provider=Ollama.
  ollama:
    image: ollama/ollama
    container_name: filer-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - filer-ollama:/root/.ollama

volumes:
  filer-pgdata:
  filer-storage:
  filer-ollama:
