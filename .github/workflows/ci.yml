name: CI

# Keep main always green: build + test on every push to main and every PR.
# Pair this with a branch protection rule requiring the "build-test" check.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Postgres mirrors docker-compose.yml so integration tests can talk to a real DB.
    # Architecture/unit tests ignore it; it costs nothing when unused.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: filer
          POSTGRES_USER: filer
          POSTGRES_PASSWORD: filer_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filer -d filer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      # Test connection string; override per-test if needed.
      ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=filer;Username=filer;Password=filer_dev_password"
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Restore the pinned local tools (Kiota) from .config/dotnet-tools.json so the
      # drift gate below regenerates with the exact version the client was built with.
      - name: Restore .NET tools
        run: dotnet tool restore

      # Kiota drift gate (ADR-011 / #126): regenerate the typed client from the
      # committed OpenAPI snapshot and fail if the result differs from what is checked
      # in — i.e. a contract change landed without regenerating the client. Offline:
      # reads src/Clients/Filer.ApiClient/openapi/v1.json, needs no running API or DB,
      # so it runs early and fails fast before the build. See the ApiClient README.
      - name: Kiota client drift gate
        run: |
          dotnet tool run kiota generate \
            -l CSharp \
            -d src/Clients/Filer.ApiClient/openapi/v1.json \
            -c FilerApiClient \
            -n Filer.ApiClient.Generated \
            -o src/Clients/Filer.ApiClient/Generated \
            --clean-output
          git diff --exit-code -- src/Clients/Filer.ApiClient/Generated \
            || { echo "::error::Generated Kiota client is out of date. Run 'dotnet tool restore' then the regenerate command in src/Clients/Filer.ApiClient/README.md and commit the result."; exit 1; }

      # Target the solution explicitly: the repo root also holds docker-compose.dcproj,
      # so a bare `dotnet restore` can't pick a single project/solution (MSB1011).
      - name: Restore
        run: dotnet restore Filer.slnx

      # Build honours warnings-as-errors (Directory.Build.props).
      - name: Build
        run: dotnet build Filer.slnx --configuration Release --no-restore

      # Coverage is collected on every run (12-testing-strategy.md); the gate
      # below turns it into a failing threshold. Architecture tests
      # (Filer.Architecture.Tests) run in this same pass.
      - name: Test
        run: >-
          dotnet test Filer.slnx --configuration Release --no-build --verbosity normal
          --collect:"XPlat Code Coverage" --results-directory ./TestResults

      # Human-readable report (12-testing-strategy.md): HTML artifact + Markdown
      # into the job summary. Exclusions per doc 12: EF migrations, Program.cs
      # wiring, source-generated code.
      - name: Coverage report
        if: always()
        run: >-
          dotnet tool run reportgenerator
          -reports:./TestResults/**/coverage.cobertura.xml
          -targetdir:./CoverageReport
          "-reporttypes:Html;JsonSummary;MarkdownSummaryGithub"
          "-classfilters:-*.Migrations.*"
          "-filefilters:-**/Program.cs;-**/*.g.cs"

      - name: Coverage summary
        if: always()
        run: cat ./CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      # Per-module gate (12-testing-strategy.md): every module/kernel assembly
      # must hold 80% line / 70% branch, on every run — same script runs locally.
      - name: Coverage gate
        run: pwsh ./build/coverage-gate.ps1 -SummaryPath ./CoverageReport/Summary.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./CoverageReport
          if-no-files-found: ignore

      - name: Upload raw coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

      # Fail on a known-vulnerable dependency (13-code-quality-and-design.md).
      - name: Vulnerable package scan
        run: |
          dotnet list Filer.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          ! grep -q "has the following vulnerable packages" vuln.txt

  # The deployable artifact is a Docker image (04/07): prove it still builds on
  # every PR. Build-only — nothing is pushed; releases publish separately.
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build API image
        run: docker build -f src/Filer.Api/Dockerfile .
